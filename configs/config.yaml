project_name: brain_tumor_mri_classifier
seed: 42
image_size: [224, 224]
batch_size: 32
epochs: 25
learning_rate: 0.0001
validation_split: 0.2
test_split: 0.1
class_names: [glioma, meningioma, pituitary, no_tumor]
model:
  architecture: enhanced_custom_cnn   # enhanced_custom_cnn, vgg19_cnn, inceptionv3_cnn
  dropout: 0.35
  l2: 0.0001
paths:
  dataset_dir: data/raw
  output_dir: outputs
